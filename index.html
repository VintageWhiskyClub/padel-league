<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel League</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
--navy: #1e2d3d;
--gold: #b8860b;
--gold-light: #f5edd6;
--bg: #f4f1eb;
--surface: #ffffff;
--border: #e2ddd4;
--text: #1a1a1a;
--text-muted: #7a7570;
--green: #2d6a4f;
--green-bg: #eaf4ef;
--red: #9b2335;
--red-bg: #fbeef0;
--radius: 10px;
}
body {
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
background: var(--bg);
color: var(--text);
min-height: 100vh;
padding-bottom: 3rem;
}
header {
background: var(--navy);
color: #fff;
padding: 1.25rem 1.5rem;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
z-index: 10;
}
header h1 {
font-size: 18px;
font-weight: 600;
letter-spacing: -0.01em;
}
header span {
font-size: 12px;
color: var(--gold);
letter-spacing: 0.08em;
text-transform: uppercase;
font-weight: 500;
}
.container { max-width: 640px; margin: 0 auto; padding: 1.25rem 1rem; }
.tabs {
display: flex;
background: var(--surface);
border: 1px solid var(--border);
border-radius: var(--radius);
padding: 4px;
gap: 4px;
margin-bottom: 1.25rem;
}
.tab {
flex: 1;
padding: 9px;
border: none;
border-radius: 7px;
background: transparent;
font-size: 14px;
font-weight: 500;
color: var(--text-muted);
cursor: pointer;
transition: all 0.15s;
}
.tab.active {
background: var(--navy);
color: #fff;
}
.card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: var(--radius);
padding: 1rem 1.25rem;
margin-bottom: 10px;
}
.card-title {
font-size: 13px;
font-weight: 600;
color: var(--text-muted);
text-transform: uppercase;
letter-spacing: 0.08em;
margin-bottom: 12px;
}
.input-row {
display: flex;
gap: 8px;
margin-bottom: 8px;
}
input[type="text"], input[type="number"] {
border: 1px solid var(--border);
border-radius: 8px;
padding: 9px 12px;
font-size: 15px;
color: var(--text);
background: var(--bg);
width: 100%;
outline: none;
-webkit-appearance: none;
}
input[type="text"]:focus, input[type="number"]:focus {
border-color: var(--navy);
background: #fff;
}
input[type="number"] { text-align: center; }
.btn {
border: 1px solid var(--border);
border-radius: 8px;
padding: 9px 16px;
font-size: 14px;
font-weight: 500;
cursor: pointer;
background: var(--surface);
color: var(--text);
white-space: nowrap;
transition: all 0.1s;
-webkit-tap-highlight-color: transparent;
}
.btn:active { opacity: 0.7; }
.btn:disabled { opacity: 0.5; cursor: default; }
.btn-primary {
background: var(--navy);
color: #fff;
border-color: var(--navy);
width: 100%;
padding: 12px;
font-size: 15px;
border-radius: var(--radius);
margin-top: 4px;
}
.btn-gold {
background: var(--gold);
color: #fff;
border-color: var(--gold);
}
.btn-sm {
padding: 5px 10px;
font-size: 12px;
border-radius: 6px;
}
.btn-danger { color: var(--red); border-color: var(--border); }
.team-row {
display: flex;
align-items: center;
justify-content: space-between;
padding: 10px 0;
border-bottom: 1px solid var(--border);
}
.team-row:last-child { border-bottom: none; }
.team-name { font-size: 15px; font-weight: 500; }
.team-players { font-size: 13px; color: var(--text-muted); margin-top: 1px; }
.fixture-card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: var(--radius);
padding: 12px 14px;
margin-bottom: 8px;
}
.fixture-card.played { border-color: var(--gold); background: var(--gold-light); }
.fixture-teams {
display: grid;
grid-template-columns: 1fr auto 1fr;
align-items: center;
gap: 6px;
margin-bottom: 10px;
}
.fixture-team { font-size: 14px; font-weight: 500; line-height: 1.3; }
.fixture-team.right { text-align: right; }
.fixture-vs { font-size: 12px; color: var(--text-muted); text-align: center; font-weight: 600; }
.score-row {
display: grid;
grid-template-columns: 1fr auto 1fr;
align-items: center;
gap: 8px;
}
.score-dash { text-align: center; font-size: 16px; color: var(--text-muted); }
.score-val { font-size: 22px; font-weight: 600; text-align: center; color: var(--navy); }
.score-val.winner { color: var(--green); }
.score-val.loser { color: var(--text-muted); }
.save-row { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
.round-label {
font-size: 11px;
font-weight: 700;
color: var(--text-muted);
text-transform: uppercase;
letter-spacing: 0.1em;
margin: 1rem 0 6px;
}
.standings-table {
width: 100%;
border-collapse: collapse;
font-size: 14px;
}
.standings-table th {
text-align: center;
padding: 6px 4px;
font-weight: 600;
font-size: 11px;
color: var(--text-muted);
text-transform: uppercase;
letter-spacing: 0.06em;
border-bottom: 2px solid var(--border);
}
.standings-table th:nth-child(2) { text-align: left; }
.standings-table td {
text-align: center;
padding: 11px 4px;
border-bottom: 1px solid var(--border);
font-size: 14px;
}
.standings-table td:nth-child(2) { text-align: left; font-weight: 500; }
.standings-table tr:last-child td { border-bottom: none; }
.pos-badge {
display: inline-flex;
align-items: center;
justify-content: center;
width: 24px;
height: 24px;
border-radius: 50%;
font-size: 12px;
font-weight: 700;
}
.pos-1 { background: var(--gold); color: #fff; }
.pos-2 { background: var(--navy); color: #fff; }
.pos-3 { background: var(--border); color: var(--text-muted); }
.pts-cell { font-weight: 700; color: var(--navy); }
.empty-state {
text-align: center;
padding: 2.5rem 1rem;
color: var(--text-muted);
}
.empty-state p { font-size: 15px; margin-top: 6px; }
.stat-pill {
display: inline-block;
background: var(--bg);
border: 1px solid var(--border);
border-radius: 20px;
padding: 3px 10px;
font-size: 12px;
color: var(--text-muted);
margin-top: 4px;
}
.section-hidden { display: none; }
.notice {
background: var(--green-bg);
border: 1px solid #a7d4b9;
border-radius: var(--radius);
padding: 10px 14px;
font-size: 13px;
color: var(--green);
margin-bottom: 1rem;
display: flex;
align-items: flex-start;
gap: 8px;
}
.notice-error {
background: var(--red-bg);
border: 1px solid #e3a9b3;
color: var(--red);
}
</style>
</head>
<body>
<header>
<h1>🎾 Padel League</h1>
<span id="league-status">Loading…</span>
</header>
<div class="container">
<div class="tabs">
<button class="tab active" onclick="showTab('teams')">Teams</button>
<button class="tab" onclick="showTab('fixtures')">Fixtures</button>
<button class="tab" onclick="showTab('standings')">Standings</button>
</div>

<div id="sync-notice"></div>

<!-- TEAMS TAB -->
<div id="tab-teams">
<div class="card">
<div class="card-title">Add a couple</div>
<div class="input-row">
<input type="text" id="p1" placeholder="Player 1" />
<input type="text" id="p2" placeholder="Player 2" />
</div>
<button class="btn btn-primary" id="add-btn" onclick="addCouple()">Add couple</button>
</div>
<div id="teams-list"></div>
<div id="generate-section" class="section-hidden" style="margin-top:12px;">
<button class="btn btn-primary btn-gold" onclick="generateFixtures()">Generate fixtures →</button>
</div>
<div style="margin-top:12px; text-align:center;">
<button class="btn btn-sm" onclick="refreshNow()">↻ Refresh</button>
</div>
<div id="reset-section" class="section-hidden" style="margin-top:12px; text-align:center;">
<button class="btn btn-sm btn-danger" onclick="resetLeague()">Reset entire league</button>
</div>
</div>

<!-- FIXTURES TAB -->
<div id="tab-fixtures" class="section-hidden">
<div id="fixtures-content"></div>
</div>

<!-- STANDINGS TAB -->
<div id="tab-standings" class="section-hidden">
<div id="standings-content"></div>
</div>
</div>

<script>
// ---- Shared cloud storage (JSONBin) ----
// All devices read/write this same bin, so everyone sees the same league.
const BIN_ID = '6a593f8dda38895dfe67f405';
const MASTER_KEY = '$2a$10$hKwGFc244ERlQfpVMLS8CujZIO1DAHj7dMmDDyHPRXOKBV0L.hgTq';
const API_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

let state = { couples: [], fixtures: [], generated: false };
let currentTab = 'teams';

function setStatus(text) {
document.getElementById('league-status').textContent = text;
}

function showSyncError(msg) {
document.getElementById('sync-notice').innerHTML =
`<div class="notice notice-error">⚠️ ${msg}</div>`;
}

function clearSyncNotice() {
document.getElementById('sync-notice').innerHTML = '';
}

async function fetchState() {
const res = await fetch(API_URL + '/latest', {
headers: { 'X-Master-Key': MASTER_KEY }
});
if (!res.ok) throw new Error('Could not load league data (status ' + res.status + ')');
const data = await res.json();
return data.record || { couples: [], fixtures: [], generated: false };
}

async function pushState(newState) {
const res = await fetch(API_URL, {
method: 'PUT',
headers: {
'Content-Type': 'application/json',
'X-Master-Key': MASTER_KEY
},
body: JSON.stringify(newState)
});
if (!res.ok) throw new Error('Could not save changes (status ' + res.status + ')');
}

async function refreshNow() {
setStatus('Syncing…');
try {
state = await fetchState();
clearSyncNotice();
renderCurrentTab();
} catch (e) {
showSyncError("Couldn't reach the shared league data. Check your internet connection and try Refresh again.");
} finally {
setStatus(state.generated ? state.couples.length + ' teams' : 'Setup');
}
}

function renderCurrentTab() {
renderTeams();
if (currentTab === 'fixtures') renderFixtures();
if (currentTab === 'standings') renderStandings();
}

async function showTab(tab) {
currentTab = tab;
['teams','fixtures','standings'].forEach(t => {
document.getElementById('tab-'+t).classList.toggle('section-hidden', t !== tab);
document.querySelectorAll('.tab')[['teams','fixtures','standings'].indexOf(t)].classList.toggle('active', t === tab);
});
await refreshNow();
}

async function addCouple() {
const p1 = document.getElementById('p1').value.trim();
const p2 = document.getElementById('p2').value.trim();
if (!p1 || !p2) { document.getElementById('p1').focus(); return; }
const btn = document.getElementById('add-btn');
btn.disabled = true;
setStatus('Saving…');
try {
state = await fetchState();
if (state.couples.length >= 8) { showSyncError('The league is full (8 couples max).'); return; }
const newCouple = { p1, p2, id: Date.now() };
state.couples.push(newCouple);
if (state.generated) {
let nextId = state.fixtures.length ? Math.max(...state.fixtures.map(f => f.id)) + 1 : 0;
state.couples.forEach(c => {
if (c.id !== newCouple.id) {
state.fixtures.push({ id: nextId++, homeId: c.id, awayId: newCouple.id, homeScore: null, awayScore: null });
}
});
}
await pushState(state);
clearSyncNotice();
document.getElementById('p1').value = '';
document.getElementById('p2').value = '';
renderTeams();
if (state.generated) renderFixtures();
} catch (e) {
showSyncError("Couldn't save that couple. Check your internet connection and try again.");
} finally {
btn.disabled = false;
setStatus(state.generated ? state.couples.length + ' teams' : 'Setup');
}
}

async function removeCouple(id) {
if (state.generated) return;
setStatus('Saving…');
try {
state = await fetchState();
state.couples = state.couples.filter(c => c.id !== id);
await pushState(state);
clearSyncNotice();
renderTeams();
} catch (e) {
showSyncError("Couldn't remove that couple. Try again.");
} finally {
setStatus(state.generated ? state.couples.length + ' teams' : 'Setup');
}
}

function renderTeams() {
const list = document.getElementById('teams-list');
const genSection = document.getElementById('generate-section');
const resetSection = document.getElementById('reset-section');
if (state.couples.length === 0) {
list.innerHTML = '<div class="card"><p style="color:var(--text-muted);font-size:14px;text-align:center;padding:0.5rem 0;">No couples added yet</p></div>';
} else {
list.innerHTML = '<div class="card">' + state.couples.map((c, i) =>
`<div class="team-row">
<div>
<div class="team-name">${c.p1} &amp; ${c.p2}</div>
</div>
${!state.generated ? `<button class="btn btn-sm btn-danger" onclick="removeCouple(${c.id})">Remove</button>` : '<span class="stat-pill">Locked</span>'}
</div>`
).join('') + '</div>';
}
genSection.classList.toggle('section-hidden', state.couples.length < 2 || state.generated);
resetSection.classList.toggle('section-hidden', !state.generated);
setStatus(state.generated ? state.couples.length + ' teams' : 'Setup');
}

async function generateFixtures() {
if (state.couples.length < 2 || state.generated) return;
setStatus('Saving…');
try {
state = await fetchState();
if (state.generated) { renderTeams(); return; }
state.fixtures = [];
let id = 0;
for (let i = 0; i < state.couples.length; i++) {
for (let j = i + 1; j < state.couples.length; j++) {
state.fixtures.push({
id: id++,
homeId: state.couples[i].id,
awayId: state.couples[j].id,
homeScore: null,
awayScore: null
});
}
}
state.generated = true;
await pushState(state);
clearSyncNotice();
renderTeams();
showTab('fixtures');
} catch (e) {
showSyncError("Couldn't generate fixtures. Try again.");
} finally {
setStatus(state.generated ? state.couples.length + ' teams' : 'Setup');
}
}

function groupIntoRounds(fixtures) {
const remaining = [...fixtures];
const rounds = [];
while (remaining.length > 0) {
const round = [];
const used = new Set();
const leftover = [];
for (const f of remaining) {
if (!used.has(f.homeId) && !used.has(f.awayId)) {
round.push(f);
used.add(f.homeId);
used.add(f.awayId);
} else {
leftover.push(f);
}
}
rounds.push(round);
if (leftover.length === remaining.length) { rounds[rounds.length-1].push(...leftover); break; }
remaining.splice(0, remaining.length, ...leftover);
}
return rounds;
}

function getCouple(id) { return state.couples.find(c => c.id === id); }

function renderFixtures() {
const el = document.getElementById('fixtures-content');
if (!state.generated || state.fixtures.length === 0) {
el.innerHTML = '<div class="empty-state">⚡️<p>Generate fixtures first from the Teams tab.</p></div>';
return;
}
const rounds = groupIntoRounds(state.fixtures);
let html = '';
rounds.forEach((round, ri) => {
html += `<div class="round-label">Round ${ri + 1}</div>`;
round.forEach(f => {
const home = getCouple(f.homeId);
const away = getCouple(f.awayId);
if (!home || !away) return;
const played = f.homeScore !== null;
if (played) {
const hw = f.homeScore > f.awayScore, aw = f.awayScore > f.homeScore;
html += `<div class="fixture-card played">
<div class="fixture-teams">
<div class="fixture-team">${home.p1} &amp; ${home.p2}</div>
<div class="fixture-vs">vs</div>
<div class="fixture-team right">${away.p1} &amp; ${away.p2}</div>
</div>
<div class="score-row">
<div class="score-val ${hw?'winner':aw?'loser':''}">${f.homeScore}</div>
<div class="score-dash">—</div>
<div class="score-val ${aw?'winner':hw?'loser':''}">${f.awayScore}</div>
</div>
<div class="save-row">
<button class="btn btn-sm" onclick="editScore(${f.id})">Edit</button>
</div>
</div>`;
} else {
html += `<div class="fixture-card" id="fix-${f.id}">
<div class="fixture-teams">
<div class="fixture-team">${home.p1} &amp; ${home.p2}</div>
<div class="fixture-vs">vs</div>
<div class="fixture-team right">${away.p1} &amp; ${away.p2}</div>
</div>
<div class="score-row">
<input type="number" min="0" max="99" id="hs-${f.id}" placeholder="0" inputmode="numeric" />
<div class="score-dash">—</div>
<input type="number" min="0" max="99" id="as-${f.id}" placeholder="0" inputmode="numeric" />
</div>
<div class="save-row">
<button class="btn btn-sm btn-gold" onclick="saveScore(${f.id})">Save result</button>
</div>
</div>`;
}
});
});
el.innerHTML = html;
}

async function saveScore(id) {
const hs = parseInt(document.getElementById('hs-'+id)?.value);
const as = parseInt(document.getElementById('as-'+id)?.value);
if (isNaN(hs) || isNaN(as)) return;
setStatus('Saving…');
try {
state = await fetchState();
const f = state.fixtures.find(x => x.id === id);
if (!f) { renderFixtures(); return; }
f.homeScore = hs;
f.awayScore = as;
await pushState(state);
clearSyncNotice();
renderFixtures();
} catch (e) {
showSyncError("Couldn't save that score. Try again.");
} finally {
setStatus(state.generated ? state.couples.length + ' teams' : 'Setup');
}
}

async function editScore(id) {
setStatus('Saving…');
try {
state = await fetchState();
const f = state.fixtures.find(x => x.id === id);
if (f) { f.homeScore = null; f.awayScore = null; }
await pushState(state);
clearSyncNotice();
renderFixtures();
} catch (e) {
showSyncError("Couldn't update that. Try again.");
} finally {
setStatus(state.generated ? state.couples.length + ' teams' : 'Setup');
}
}

function renderStandings() {
const el = document.getElementById('standings-content');
if (!state.generated || state.couples.length === 0) {
el.innerHTML = '<div class="empty-state">📊<p>Add teams and generate fixtures first.</p></div>';
return;
}
const stats = {};
state.couples.forEach(c => {
stats[c.id] = { name: c.p1 + ' & ' + c.p2, p:0, w:0, l:0, d:0, gf:0, ga:0, pts:0 };
});
state.fixtures.forEach(f => {
if (f.homeScore === null) return;
const h = stats[f.homeId], a = stats[f.awayId];
if (!h || !a) return;
h.p++; a.p++;
h.gf += f.homeScore; h.ga += f.awayScore;
a.gf += f.awayScore; a.ga += f.homeScore;
if (f.homeScore > f.awayScore) { h.w++; h.pts+=3; a.l++; }
else if (f.awayScore > f.homeScore) { a.w++; a.pts+=3; h.l++; }
else { h.d++; h.pts++; a.d++; a.pts++; }
});
const rows = Object.values(stats).sort((a,b) => b.pts - a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf-a.gf);
const played = state.fixtures.filter(f => f.homeScore !== null).length;
const total = state.fixtures.length;
el.innerHTML = `
<div class="notice">📊 ${played} of ${total} fixtures played</div>
<div class="card" style="padding:0 1.25rem;">
<table class="standings-table">
<thead>
<tr>
<th style="text-align:center;width:36px;">#</th>
<th>Team</th>
<th>P</th><th>W</th><th>L</th>
<th>GF</th><th>GA</th>
<th>Pts</th>
</tr>
</thead>
<tbody>
${rows.map((r, i) => {
const pos = i < 3 ? `<span class="pos-badge pos-${i+1}">${i+1}</span>` : `<span style="color:var(--text-muted);font-size:13px;">${i+1}</span>`;
return `<tr>
<td>${pos}</td>
<td>${r.name}</td>
<td>${r.p}</td><td>${r.w}</td><td>${r.l}</td>
<td>${r.gf}</td><td>${r.ga}</td>
<td class="pts-cell">${r.pts}</td>
</tr>`;
}).join('')}
</tbody>
</table>
</div>`;
}

async function resetLeague() {
if (!confirm('Reset the entire league? All scores and fixtures will be lost.')) return;
setStatus('Saving…');
try {
state = { couples: [], fixtures: [], generated: false };
await pushState(state);
clearSyncNotice();
renderTeams();
showTab('teams');
} catch (e) {
showSyncError("Couldn't reset the league. Try again.");
}
}

// Initial load
refreshNow();
</script>
</body>
</html>
